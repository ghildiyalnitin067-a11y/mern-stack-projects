<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/6869/6869547.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskTusk | Your Local Service Marketplace</title>
    <meta name="description" content="Connect with local, verified service professionals for plumbing, electrical, cleaning, tutoring and more." />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TaskTusk | Your Local Service Marketplace" />
    <meta property="og:description" content="Connect with local, verified service professionals for home services, repair, and cleaning." />
    <meta property="og:url" content="https://tasktusk.com/" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1581578731548-c64695cc6952?q=80&w=1200&auto=format&fit=crop" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TaskTusk | Your Local Service Marketplace" />
    <meta name="twitter:description" content="Connect with local, verified service professionals easily and securely." />

    <!-- Schema.org JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Marketplace",
      "name": "TaskTusk",
      "url": "https://tasktusk.com/",
      "description": "Local home service marketplace connecting customers with verified repair and cleaning professionals.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tasktusk.com/services?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
