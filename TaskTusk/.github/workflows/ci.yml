name: TaskTusk Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install & Audit Backend
      run: |
        cd Backend
        npm ci || npm install

    - name: Build Frontend
      run: |
        cd Frontend
        npm ci || npm install
        npm run build

    - name: Build Admin
      run: |
        cd Admin
        npm ci || npm install
        npm run build
