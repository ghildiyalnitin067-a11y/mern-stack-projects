version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: tasktusk-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: tasktusk-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/tasktusk
      - JWT_SECRET=production_secret_key_tasktusk_2026
      - NODE_ENV=production
    depends_on:
      - mongodb

volumes:
  mongo-data:
